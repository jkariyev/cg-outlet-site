<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CG Outlet</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="site-header">
    <div class="header-left">
      <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Categories">&#9776;</button>
      <a href="." class="site-logo">CG Outlet</a>
    </div>
    <span class="site-brands" id="brand-list"></span>
    <button class="cart-btn" id="cart-btn" aria-label="Cart">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <span class="cart-count" id="cart-count"></span>
    </button>
  </header>

  <!-- Category Sidebar -->
  <div class="cat-sidebar" id="cat-sidebar">
    <div class="cat-sidebar-header">
      <span>Categories</span>
      <button class="cat-sidebar-close" id="sidebar-close">&times;</button>
    </div>
    <div class="cat-sidebar-list" id="sidebar-cat-list"></div>
  </div>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <section class="hero">
    <h1 class="hero-title">Curated Luxury</h1>
  </section>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-pill active" data-category="all">All</button>
  </div>

  <div class="product-grid" id="product-grid">
    <div class="loading-screen" id="loading-screen">
      <div class="loading-logo">CG Outlet</div>
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading Collection</div>
    </div>
  </div>

  <!-- Product Modal -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal" id="modal">
      <div class="modal-images">
        <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
        <div class="modal-main-image">
          <img id="modal-main-img" src="" alt="">
          <button class="modal-img-nav modal-img-prev" id="modal-img-prev" style="display:none" aria-label="Previous image">&#8249;</button>
          <button class="modal-img-nav modal-img-next" id="modal-img-next" style="display:none" aria-label="Next image">&#8250;</button>
        </div>
        <div class="modal-thumbs" id="modal-thumbs"></div>
      </div>

      <div class="modal-info">
        <div>
          <div class="modal-brand" id="modal-brand"></div>
          <div class="modal-name" id="modal-name"></div>
        </div>

        <div id="modal-labels-section" style="display:none">
          <div class="modal-labels-label">Label</div>
          <div class="label-pills" id="modal-labels"></div>
        </div>

        <div id="modal-colors-section" style="display:none">
          <div class="modal-colors-label">Color</div>
          <div class="color-swatches" id="modal-swatches"></div>
        </div>

        <div id="modal-sizes-section" style="display:none">
          <div class="modal-sizes-label">Size</div>
          <div class="size-pills" id="modal-sizes"></div>
        </div>

        <div class="modal-desc" id="modal-desc"></div>

        <a href="#" class="btn-reach-out" id="reach-out-btn" target="_blank" rel="noopener">
          Reach Out to Buy
        </a>
        <button type="button" class="btn-add-to-cart" id="add-to-cart-btn">
          + Add to Cart
        </button>
      </div>
    </div>
  </div>

  <!-- Cart Panel -->
  <div class="cart-panel" id="cart-panel">
    <div class="cart-panel-header">
      <span class="cart-panel-title">Cart</span>
      <button class="cart-panel-close" id="cart-close">&times;</button>
    </div>
    <div class="cart-items" id="cart-items">
      <div class="cart-empty">Your cart is empty</div>
    </div>
    <div class="cart-panel-footer">
      <a href="#" class="btn-reach-out" id="cart-reach-out" target="_blank" rel="noopener" style="display:none">
        Reach Out to Buy All
      </a>
    </div>
  </div>
  <div class="cart-overlay" id="cart-overlay"></div>

  <script src="js/main.js"></script>
</body>
</html>
